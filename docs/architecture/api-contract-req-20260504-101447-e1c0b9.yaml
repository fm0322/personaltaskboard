openapi: 3.0.3
info:
  title: Personal Task Board API
  version: 1.0.0
  description: API contract for columns and tasks management in Personal Task Board.
servers:
  - url: http://localhost:5000
paths:
  /api/columns:
    get:
      summary: List columns
      operationId: listColumns
      responses:
        '200':
          description: Columns returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Column'
    post:
      summary: Create column
      operationId: createColumn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateColumnRequest'
      responses:
        '201':
          description: Column created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Column'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/columns/{id}:
    put:
      summary: Update column
      operationId: updateColumn
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateColumnRequest'
      responses:
        '200':
          description: Column updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Column'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete column
      operationId: deleteColumn
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Column deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /api/tasks:
    get:
      summary: List tasks with optional filters
      operationId: listTasks
      parameters:
        - name: columnId
          in: query
          schema:
            type: string
            format: uuid
        - name: priority
          in: query
          schema:
            $ref: '#/components/schemas/Priority'
        - name: search
          in: query
          description: Title/description search text
          schema:
            type: string
            maxLength: 200
      responses:
        '200':
          description: Tasks returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskItem'
    post:
      summary: Create task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskItem'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/tasks/{id}:
    get:
      summary: Get task by id
      operationId: getTask
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          description: Task returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskItem'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update task
      operationId: updateTask
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete task
      operationId: deleteTask
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          description: Task deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /api/tasks/{id}/move:
    patch:
      summary: Move task to another column and position
      operationId: moveTask
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveTaskRequest'
      responses:
        '200':
          description: Task moved and reordered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskItem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/columns/reorder:
    patch:
      summary: Reorder columns
      operationId: reorderColumns
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderColumnsRequest'
      responses:
        '204':
          description: Columns reordered
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/tasks/reorder:
    patch:
      summary: Reorder tasks within a column
      operationId: reorderTasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderTasksRequest'
      responses:
        '204':
          description: Tasks reordered
        '400':
          $ref: '#/components/responses/BadRequest'

components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    Priority:
      type: string
      enum: [Low, Medium, High, Urgent]

    Board:
      type: object
      required: [id, name, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 100
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Column:
      type: object
      required: [id, boardId, name, displayOrder, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        boardId:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 80
        displayOrder:
          type: integer
          minimum: 0
        wipLimit:
          type: integer
          minimum: 1
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TaskItem:
      type: object
      required:
        [id, columnId, title, priority, sortOrder, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        columnId:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 4000
          nullable: true
        dueDate:
          type: string
          format: date
          nullable: true
        priority:
          $ref: '#/components/schemas/Priority'
        assigneeLabel:
          type: string
          maxLength: 60
          nullable: true
        sortOrder:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateColumnRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 80
        wipLimit:
          type: integer
          minimum: 1
          nullable: true

    UpdateColumnRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 80
        wipLimit:
          type: integer
          minimum: 1
          nullable: true

    CreateTaskRequest:
      type: object
      required: [columnId, title, priority]
      properties:
        columnId:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 4000
          nullable: true
        dueDate:
          type: string
          format: date
          nullable: true
        priority:
          $ref: '#/components/schemas/Priority'
        assigneeLabel:
          type: string
          maxLength: 60
          nullable: true

    UpdateTaskRequest:
      type: object
      required: [title, priority, columnId]
      properties:
        columnId:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 4000
          nullable: true
        dueDate:
          type: string
          format: date
          nullable: true
        priority:
          $ref: '#/components/schemas/Priority'
        assigneeLabel:
          type: string
          maxLength: 60
          nullable: true

    MoveTaskRequest:
      type: object
      required: [targetColumnId, targetIndex]
      properties:
        targetColumnId:
          type: string
          format: uuid
        targetIndex:
          type: integer
          minimum: 0

    ReorderColumnsRequest:
      type: object
      required: [columnIds]
      properties:
        columnIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid

    ReorderTasksRequest:
      type: object
      required: [columnId, taskIds]
      properties:
        columnId:
          type: string
          format: uuid
        taskIds:
          type: array
          minItems: 0
          items:
            type: string
            format: uuid

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        details:
          type: array
          items:
            type: string
